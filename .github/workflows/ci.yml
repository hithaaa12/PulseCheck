name: PulseCheck CI/CD

on:
  push:
    branches:
      - main

jobs:

  build-and-test:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Tests
        env:
          PYTHONPATH: .
        run: |
          pytest

      - name: Build Docker Image
        run: |
          docker build -t pulsecheck .

      - name: Run Container
        run: |
          docker run -d -p 8000:8000 --name pulsecheck-container pulsecheck

      - name: Wait For App Startup
        run: sleep 10

      - name: Validate Health Endpoint
        run: |
          curl http://localhost:8000/health